services:
  - type: web
    name: japp-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_KEY
        sync: false  # Will prompt you to enter this during setup
    healthCheckPath: /health